services:
  - type: web
    name: phishguard-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.core.config:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.0
